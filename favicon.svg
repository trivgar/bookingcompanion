<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0a0a0a"/>
  <!-- Calendar body -->
  <rect x="22" y="30" width="56" height="48" rx="6" fill="none" stroke="hsl(43, 74%, 52%)" stroke-width="3"/>
  <!-- Calendar top bar -->
  <rect x="22" y="30" width="56" height="14" rx="6" fill="hsl(43, 74%, 52%)"/>
  <rect x="22" y="38" width="56" height="6" fill="hsl(43, 74%, 52%)"/>
  <!-- Calendar hooks -->
  <line x1="36" y1="24" x2="36" y2="36" stroke="hsl(43, 74%, 52%)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="64" y1="24" x2="64" y2="36" stroke="hsl(43, 74%, 52%)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Checkmark -->
  <polyline points="36,58 46,68 64,50" fill="none" stroke="hsl(43, 74%, 52%)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
